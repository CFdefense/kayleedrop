name: release-binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            tarball_suffix: amd64
          - runner: ubuntu-24.04-arm
            tarball_suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: System packages for iced / TLS native build
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            cmake \
            libdbus-1-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libudev-dev \
            libgtk-3-dev \
            libasound2-dev

      - run: cargo build --release --locked

      - run: strip target/release/kayleedrop || true

      - name: Pack tarball
        run: |
          out="kayleedrop-linux-${{ matrix.tarball_suffix }}.tar.gz"
          tar -C target/release -czvf "${out}" kayleedrop
          ls -la "${out}"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.tarball_suffix }}-tarball
          path: kayleedrop-linux-${{ matrix.tarball_suffix }}.tar.gz

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: kayleedrop-linux-${{ matrix.tarball_suffix }}.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}

  macos-arm64:
    # Apple Silicon (M-series) — fits MacBook-class laptops; GH `macos-latest` is ARM64.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo build --release --locked

      - run: strip target/release/kayleedrop || true

      - name: Pack tarball
        run: |
          out="kayleedrop-darwin-arm64.tar.gz"
          tar -C target/release -czvf "${out}" kayleedrop
          ls -la "${out}"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-tarball
          path: kayleedrop-darwin-arm64.tar.gz

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: kayleedrop-darwin-arm64.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
